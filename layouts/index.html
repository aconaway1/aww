{{ define "main" }}
  <section class="hero">
    <h1>{{ .Title }}</h1>
    <p>{{ .Content }}</p>
  </section>

  <section class="posts">
    <h2>Latest posts</h2>
    <ul>
      {{ range first 5 (where .Site.RegularPages "Type" "posts") }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          <p>{{ .Summary }}</p>
        </li>
      {{ else }}
        <li>No posts yet.</li>
      {{ end }}
    </ul>
  </section>
{{ end }}
