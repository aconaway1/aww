{{ define "main" }}
  <section class="section-list">
    <h1>{{ .Title }}</h1>

    {{ if .Description }}
      <p>{{ .Description }}</p>
    {{ end }}

    <ul class="list-items">
      {{ range .Pages }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ else }}
        <li>No content found.</li>
      {{ end }}
    </ul>
  </section>
{{ end }}
