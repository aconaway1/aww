baseURL = 'https://aww-3cz.pages.dev/'
title = "Aaron's Worthless Words"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

enableGitInfo = false
enableRobotsTXT = true

[params]
  author = "Aaron Conaway"
  dateFormat = "2006-01-02"
  defaultTheme = "auto"
  description = "A personal technical blog"
  recentPostsCount = 5
  showAuthor = true
  showReadingTime = true
  showShareButtons = true
  sidebar = true

[[params.sidebarModules]]
  partial = "archive"

[params.social]
  github = "aconaway1"

[menus]
[[menus.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 3

[taxonomies]
  archive = "archives"
  category = "categories"
  tag = "tags"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = true
    noClasses = false
    style = "github"
    tabWidth = 4
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML", "RSS"]

[pagination]
  pagerSize = 10

[module]
  [[module.imports]]
    path = "go.ngs.io/hugo-primer-blog"
