baseURL = 'https://aconaway.com/'
title = "Aaron's Worthless Words"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

enableGitInfo = false
enableRobotsTXT = true

[params]
  author = "Aaron Conaway"
  dateFormat = "2006-01-02"
  defaultTheme = "auto"
  description = "A personal technical blog"
  recentPostsCount = 5
  showAuthor = true
  showReadingTime = true
  favicon = "favicon.svg"
  showShareButtons = false
  sidebar = true
  themeColor = "blue"

[params.logo]
  logoText = "Aaron's Worthless Words"

[[params.sidebarModules]]
  partial = "archive"

[params.social]
  github = "aconaway1"
  mastodon = "https://masto.ai/@aconaway"

[menus]
[[menus.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 3

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 4

[taxonomies]
  archive = "archives"
  category = "categories"
  tag = "tags"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = false
    noClasses = true
    style = "dracula"
    tabWidth = 4
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML", "RSS"]

[pagination]
  pagerSize = 10

[module]
  [[module.imports]]
    path = "github.com/panr/hugo-theme-terminal"
